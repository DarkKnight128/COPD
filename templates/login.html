{% extends "base.html" %}
{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h1>登录 COPD MVP</h1>
    <p class="muted">使用本地演示账号进入系统，账号权限仅用于项目验收演示。</p>
    {% if error %}
    <div class="alert danger-alert">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="auth-form">
      <input type="hidden" name="next" value="{{ next }}">
      <label>
        <span>账号</span>
        <input name="username" autocomplete="username" required>
      </label>
      <label>
        <span>密码</span>
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button class="primary" type="submit">登录</button>
    </form>
    <table class="demo-account-table">
      <thead>
        <tr><th>角色</th><th>账号</th><th>密码</th></tr>
      </thead>
      <tbody>
        <tr><td>管理员</td><td>admin</td><td>admin123</td></tr>
        <tr><td>医生</td><td>doctor</td><td>doctor123</td></tr>
        <tr><td>科研人员</td><td>researcher</td><td>researcher123</td></tr>
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
