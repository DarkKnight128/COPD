<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "COPD POC Demo" }}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/patients">COPD POC</a>
      <nav>
        {% if current_user %}
        {% if current_user.role == "管理员" %}
        <a href="/import">导入</a>
        <a href="/imports">导入日志</a>
        <a href="/admin/logs">操作日志</a>
        <a href="/admin/users">演示账号</a>
        <a href="/admin/config">系统配置</a>
        {% endif %}
        <a href="/patients">患者列表</a>
        <span class="user-chip">{{ current_user.display_name }} · {{ current_user.role }}</span>
        <form class="nav-logout" method="post" action="/logout">
          <button type="submit">退出</button>
        </form>
        {% else %}
        <a href="/login">登录</a>
        {% endif %}
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    <script>
      window.addEventListener("pageshow", function (event) {
        if (event.persisted) {
          window.location.reload();
        }
      });
      document.querySelectorAll(".require-review-comment").forEach(function (form) {
        var input = form.querySelector(".required-review-comment");
        var buttons = form.querySelectorAll(".requires-review-comment");
        if (!input || !buttons.length) {
          return;
        }
        var refreshButtons = function () {
          var hasComment = input.value.trim().length > 0;
          buttons.forEach(function (button) {
            button.disabled = !hasComment;
          });
        };
        input.addEventListener("input", refreshButtons);
        refreshButtons();
      });
    </script>
  </body>
</html>
